name: echomind
description: "AI Diary"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^17.2.1
  table_calendar: ^3.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  flutter_native_splash:
    color: "#0F172A"

    image: assets/logo.png

    android: true
    ios: true

    android_12:
      image: assets/logo.png
      color: "#0F172A"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png

flutter_background_service: ^5.0.6